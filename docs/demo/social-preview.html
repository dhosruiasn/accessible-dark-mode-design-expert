<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Accessible Dark Mode Design Expert</title>
  <style>
    * { box-sizing: border-box; }
    body {
      width: 1280px;
      height: 640px;
      margin: 0;
      overflow: hidden;
      color: #f8fafc;
      background:
        radial-gradient(circle at 84% 5%, rgba(56, 189, 248, .26), transparent 34%),
        radial-gradient(circle at 8% 110%, rgba(167, 139, 250, .18), transparent 35%),
        #0c1222;
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .frame {
      position: relative;
      display: grid;
      grid-template-columns: 1fr 340px;
      align-items: center;
      width: 100%;
      height: 100%;
      padding: 76px 90px;
    }
    .frame::before {
      content: "";
      position: absolute;
      inset: 28px;
      border: 1px solid rgba(226, 232, 240, .14);
      border-radius: 28px;
      pointer-events: none;
    }
    .eyebrow { margin: 0 0 20px; color: #7dd3fc; font-size: 17px; font-weight: 760; letter-spacing: .14em; text-transform: uppercase; }
    h1 { max-width: 760px; margin: 0; font-size: 65px; line-height: 1.03; letter-spacing: -.045em; }
    .subtitle { max-width: 730px; margin: 25px 0 0; color: #cbd5e1; font-size: 23px; line-height: 1.45; }
    .chips { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 30px; }
    .chip { padding: 8px 13px; border: 1px solid rgba(125, 211, 252, .28); border-radius: 999px; color: #bae6fd; background: rgba(56, 189, 248, .08); font-size: 14px; font-weight: 680; }
    .mark { position: relative; display: grid; place-items: center; justify-self: end; width: 286px; height: 286px; border: 1px solid rgba(226,232,240,.15); border-radius: 64px; background: rgba(17, 26, 45, .74); box-shadow: 0 30px 80px rgba(2, 6, 23, .5); transform: rotate(3deg); }
    .mark img { width: 224px; height: 224px; border-radius: 42px; transform: rotate(-3deg); }
    .footer { position: absolute; right: 90px; bottom: 58px; color: #94a3b8; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 14px; }
  </style>
</head>
<body>
  <main class="frame">
    <section>
      <p class="eyebrow">Codex + Claude Code Agent Skill</p>
      <h1>Accessible Dark Mode Design Expert</h1>
      <p class="subtitle">Design, implement, review, and audit adaptive light/dark theme systems with executable contrast verification.</p>
      <div class="chips"><span class="chip">WCAG contrast</span><span class="chip">Semantic tokens</span><span class="chip">Reduced motion</span><span class="chip">Cross-runtime</span></div>
    </section>
    <div class="mark"><img src="../assets/logo.png" alt=""></div>
    <div class="footer">github.com/dhosruiasn</div>
  </main>
</body>
</html>
