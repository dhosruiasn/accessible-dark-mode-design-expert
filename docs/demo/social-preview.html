<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Accessible Dark Mode Design Expert</title>
  <style>
    * { box-sizing: border-box; }
    body {
      width: 1280px;
      height: 640px;
      margin: 0;
      overflow: hidden;
      color: #f5d36d;
      background: #6f260f url("../assets/social-preview-background.png") center / cover no-repeat;
      font-family: Georgia, "Times New Roman", ui-serif, serif;
    }
    .frame {
      position: relative;
      display: flex;
      align-items: center;
      width: 100%;
      height: 100%;
      padding: 62px 72px;
    }
    .frame::before {
      content: "";
      position: absolute;
      inset: 25px;
      border: 1px solid rgba(224, 183, 136, .42);
      box-shadow: inset 0 0 0 4px rgba(70, 17, 8, .12);
      pointer-events: none;
    }
    .frame::after {
      content: "";
      position: absolute;
      inset: 26px auto 26px 26px;
      width: 760px;
      background: linear-gradient(90deg, rgba(72, 19, 8, .42), rgba(72, 19, 8, .12) 76%, transparent);
      pointer-events: none;
    }
    .copy { position: relative; z-index: 1; width: 710px; text-shadow: 0 3px 12px rgba(50, 10, 5, .45); }
    .eyebrow {
      margin: 0 0 22px;
      color: #ddb489;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      font-weight: 750;
      letter-spacing: .18em;
      text-transform: uppercase;
    }
    h1 { margin: 0; font-size: 64px; font-weight: 500; line-height: .99; letter-spacing: -.035em; }
    h1 span { display: block; }
    .subtitle { max-width: 670px; margin: 26px 0 0; color: #f1dcc4; font-size: 21px; line-height: 1.45; }
    .capabilities {
      margin: 29px 0 0;
      color: #deb789;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      font-weight: 680;
      letter-spacing: .025em;
    }
    .capabilities b { padding: 0 10px; color: #f5d36d; font-family: Georgia, "Times New Roman", serif; font-weight: 400; }
    .footer { position: absolute; z-index: 1; right: 58px; bottom: 42px; color: #d3a778; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; letter-spacing: .02em; }
  </style>
</head>
<body>
  <main class="frame">
    <section class="copy">
      <p class="eyebrow">Codex + Claude Code Agent Skill</p>
      <h1><span>Accessible Dark Mode</span><span>Design Expert</span></h1>
      <p class="subtitle">Design, implement, review, and audit adaptive light/dark theme systems with executable contrast verification.</p>
      <p class="capabilities">WCAG contrast <b>✦</b> Semantic tokens <b>✦</b> Reduced motion <b>✦</b> Cross-runtime</p>
    </section>
    <div class="footer">github.com/dhosruiasn</div>
  </main>
</body>
</html>
